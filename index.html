<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalie a House Secure</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    text-align:center;
    color:white;
}

.container{
    padding:40px 20px;
}

.logo{
    max-width:200px;
    margin-bottom:25px;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    font-size:18px;
    margin-bottom:35px;
    color:#cbd5e1;
}

.btn{
    display:block;
    width:90%;
    max-width:420px;
    margin:20px auto;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:50px;
    text-decoration:none;
    transition:0.3s;
}

/* BOTÃO GOOGLE */
.btn-google{
    background:#fbbc05;
    color:#000;
    animation:pulseGoogle 1.5s infinite;
}

@keyframes pulseGoogle{
    0%{box-shadow:0 0 10px #fbbc05;}
    50%{box-shadow:0 0 35px #fff176;}
    100%{box-shadow:0 0 10px #fbbc05;}
}

/* BOTÃO WHATSAPP */
.btn-whats{
    background:#25D366;
    color:white;
    animation:pulseWhats 1.5s infinite;
}

@keyframes pulseWhats{
    0%{box-shadow:0 0 10px #25D366;}
    50%{box-shadow:0 0 35px #6eff9a;}
    100%{box-shadow:0 0 10px #25D366;}
}

.btn:hover{
    transform:scale(1.05);
}

footer{
    margin-top:50px;
    font-size:14px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="./housesecure.jpg" class="logo" alt="House Secure">

    <h1>⭐ Sua opinião é muito importante!</h1>
    <p>Se você ficou satisfeito com nosso serviço, deixe sua avaliação no Google ou fale conosco pelo WhatsApp.</p>

    <!-- BOTÃO GOOGLE -->
    <a href="https://g.page/r/CeL4xMoSMFRqEAE/review" 
       target="_blank" 
       class="btn btn-google">
        ⭐⭐⭐⭐⭐ Avaliar no Google
    </a>

    <!-- BOTÃO WHATSAPP -->
    <a href="https://wa.me/5511977788270" 
       target="_blank" 
       class="btn btn-whats">
        📲 Falar no WhatsApp
    </a>

    <footer>
        © 2026 House Secure - Segurança Eletrônica
    </footer>

</div>

</body>
</html>
