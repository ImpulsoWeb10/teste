<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie a House Secure | Proteção Inteligente</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-google: #4285F4;
            --dark-bg: #0a1f44; /* Azul escuro da House Secure */
            --accent-yellow: #f4b400;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--dark-bg);
            /* Efeito de iluminação suave no fundo escuro */
            background-image: radial-gradient(circle at center, #162e5a 0%, #0a1f44 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .card {
            background: #ffffff;
            color: #1e293b;
            max-width: 420px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-img {
            width: 120px;
            margin-bottom: 20px;
        }

        .stars { margin-bottom: 15px; }
        .stars i {
            color: var(--accent-yellow);
            font-size: 2rem;
            margin: 0 2px;
            filter: drop-shadow(0 4px 8px rgba(244, 180, 0, 0.3));
        }

        h1 { font-weight: 800; font-size: 1.5rem; margin-bottom: 10px; color: var(--dark-bg); }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }

        /* BOTÃO GOOGLE COM BRILHO E PULSO */
        .btn-google {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--primary-google);
            color: white;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(66, 133, 244, 0.4);
            animation: pulseBtn 2s infinite;
        }

        /* Efeito de Brilho Passando (Shine) */
        .btn-google::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        /* QR Code Styling */
        .qr-container {
            margin: 25px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }
        
        #qrcode img {
            margin: 0 auto;
            border: 4px solid white;
            border-radius: 8px;
        }

        .qr-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        /* Selos de Segurança */
        .security {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 10px;
            font-weight: 600;
        }
        .security i { color: #22c55e; }

        /* Rodapé Impulso Web 10 */
        footer { margin-top: 40px; }
        .dev-link {
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 50px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .dev-link:hover {
            background: #25D366;
            color: white;
            transform: translateY(-3px);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.png" alt="House Secure" class="logo-img" onerror="this.style.display='none'">
        
        <div class="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
        </div>

        <h1>Sua segurança é nossa prioridade!</h1>
        <p>Gostou do nosso serviço? Avalie-nos no Google. Leva menos de 30 segundos.</p>

        <a href="#" target="_blank" class="btn-google" id="googleLink">
            <i class="fab fa-google"></i> AVALIAR NO GOOGLE
        </a>

        <div class="qr-container">
            <span class="qr-label">Ou escaneie no balcão</span>
            <div id="qrcode"></div>
        </div>

        <div class="security">
            <span><i class="fas fa-lock"></i> SSL SEGURO</span>
            <span><i class="fas fa-shield-check"></i> SITE VERIFICADO</span>
        </div>
    </div>

    <footer>
        <a href="https://wa.me/5511977788270?text=Olá,%20vim%20pelo%20rodapé%20da%20página%20de%20avaliação" target="_blank" class="dev-link">
            Desenvolvido por <strong>Impulso Web 10</strong> <i class="fab fa-whatsapp"></i>
        </a>
    </footer>

    <script>
        // CONFIGURAÇÃO: Seu link de avaliação (o mesmo que estava no seu código original)
        const googleReviewURL = "https://g.page/r/CeL4xMoSMFRqEAE/review";

        // Aplica o link ao botão
        document.getElementById('googleLink').href = googleReviewURL;

        // Gera o QR Code automaticamente
        new QRCode(document.getElementById("qrcode"), {
            text: googleReviewURL,
            width: 140,
            height: 140,
            colorDark : "#0a1f44",
            colorLight : "#f8fafc",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
