<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Segura | Impulso Web 10</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4285F4;
            --success: #34A853;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            /* Fundo Moderno Estilo Mesh Gradient */
            background: background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(186,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(242,100%,92%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(192,100%,92%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Efeito de Vidro (Glassmorphism) */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            position: relative;
        }

        .stars {
            margin-bottom: 20px;
        }

        .stars i {
            color: #FBBC05;
            font-size: 2.5rem;
            margin: 0 3px;
            filter: drop-shadow(0 0 10px rgba(251, 188, 5, 0.4));
            animation: starBounce 1s ease infinite alternate;
        }

        @keyframes starBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        h1 {
            font-weight: 800;
            color: #1e293b;
            font-size: 1.7rem;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Botão principal com gradiente */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #4285F4, #34a853);
            color: white;
            padding: 20px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(66, 133, 244, 0.3);
            margin-bottom: 15px;
        }

        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(66, 133, 244, 0.4);
        }

        /* Selos de Segurança */
        .security-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
            font-size: 0.75rem;
            color: #64748b;
            font-weight: 600;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-item i {
            color: #16a34a; /* Verde sucesso */
            font-size: 1rem;
        }

        /* QR Code Minimalista */
        .qr-area {
            margin-top: 20px;
            opacity: 0.7;
        }

        /* Rodapé com link WhatsApp */
        footer {
            margin-top: 40px;
            text-align: center;
        }

        .dev-link {
            text-decoration: none;
            color: #475569;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.5);
            padding: 8px 15px;
            border-radius: 50px;
        }

        .dev-link:hover {
            background: #25D366;
            color: white;
        }

        .dev-link strong { font-weight: 800; }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
        </div>

        <h1>Sua opinião é muito importante para nós!</h1>
        <p>Ajude nossa empresa a crescer e melhorar nossos serviços com apenas 2 cliques.</p>

        <a href="SEU_LINK_DO_GOOGLE_AQUI" target="_blank" class="btn-google">
            <i class="fab fa-google"></i> Deixar avaliação no Google
        </a>

        <div class="security-badges">
            <div class="badge-item">
                <i class="fas fa-shield-halved"></i> Site Seguro
            </div>
            <div class="badge-item">
                <i class="fas fa-lock"></i> SSL Ativo
            </div>
            <div class="badge-item">
                <i class="fas fa-certificate"></i> Verificado
            </div>
        </div>

        <div class="qr-area">
            <i class="fas fa-qrcode" style="font-size: 2rem;"></i>
            <div style="font-size: 0.6rem; margin-top: 5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Escaneie para avaliar</div>
        </div>
    </div>

    <footer>
        <a href="https://wa.me/55119XXXXXXXX" target="_blank" class="dev-link">
            Desenvolvido por <strong>Impulso Web 10</strong> <i class="fab fa-whatsapp"></i>
        </a>
    </footer>

    <script>
        // Animação de entrada suave para os elementos
        window.addEventListener('load', () => {
            const card = document.querySelector('.glass-card');
            card.style.opacity = '0';
            card.style.transform = 'scale(0.9)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
            }, 100);
        });
    </script>
</body>
</html>
