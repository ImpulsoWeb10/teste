<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie-nos no Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4285F4; /* Google Blue */
            --secondary-color: #34A853; /* Google Green */
            --text-dark: #333;
            --text-light: #666;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estrelas */
        .stars {
            color: #FBBC05; /* Google Gold */
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-dark);
            font-size: 1.8rem;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        p {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Botões */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-google {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .btn-google:hover {
            transform: scale(1.03);
            background-color: #3367d6;
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.4);
        }

        .btn-whatsapp {
            background-color: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.3);
        }

        .btn-whatsapp:hover {
            transform: scale(1.03);
            background-color: #2d9249;
            box-shadow: 0 6px 20px rgba(52, 168, 83, 0.4);
        }

        /* QR Code */
        .qr-section {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .qr-icon {
            font-size: 3rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .qr-text {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Rodapé */
        footer {
            margin-top: 30px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Responsividade Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 { font-size: 1.5rem; }
            .stars { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="stars">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
        </div>

        <h1>Sua opinião é muito importante para nós!</h1>
        <p>Sua avaliação nos ajuda a melhorar nossos serviços e ajuda outras pessoas a nos encontrarem no Google.</p>

        <a href="SUA_URL_DO_GOOGLE_AQUI" target="_blank" class="btn btn-google">
            <i class="fab fa-google"></i> Deixar avaliação no Google
        </a>

        <a href="https://wa.me/SEUNUMEROAQUI" target="_blank" class="btn btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Falar conosco no WhatsApp
        </a>

        <div class="qr-section">
            <div class="qr-icon">
                <i class="fas fa-qrcode"></i>
            </div>
            <p class="qr-text">Escaneie o código no balcão</p>
        </div>
    </div>

    <footer>
        Desenvolvido por <strong>Impulso Web 10</strong>
    </footer>

    <script>
        // Pequena interação: As estrelas brilham ao carregar
        document.querySelectorAll('.stars i').forEach((star, index) => {
            star.style.opacity = '0';
            setTimeout(() => {
                star.style.opacity = '1';
                star.style.transition = 'opacity 0.5s ease';
            }, index * 150);
        });
    </script>
</body>
</html>
