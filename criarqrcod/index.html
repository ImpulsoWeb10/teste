<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}

button, select, input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
}

#canvas {
  width: 90vw;
  max-width: 900px;
  aspect-ratio: 1/1;
  margin: 20px auto;
  position: relative;
  background-size: cover;
  background-position: center;
  border-radius: 12px;
  overflow: hidden;
}

#qrcode {
  position: absolute;
  width: 25%;
  aspect-ratio: 1/1;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* encaixe automático */
.template-qr {
  top: 70% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) !important;
  width: 30% !important;
}

/* moldura */
#moldura {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-size: cover;
  z-index: 2;
}

/* galeria */
#galeria {
  display: flex;
  overflow-x: auto;
}

#galeria img {
  width: 120px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 QR PRO MAX</h2>

<input id="link" placeholder="Seu link">
<button onclick="gerarQR()">Gerar QR</button>

<br>

<input id="tema" placeholder="Tema da arte">
<button onclick="buscarImagem()">Buscar</button>
<button onclick="autoIA()">🤖 IA Auto</button>

<br>

<select onchange="aplicarTemplate(this.value)">
  <option value="">🎨 Escolher Template</option>
  <option value="promo">Promoção</option>
  <option value="luxo">Luxo</option>
  <option value="dark">Dark</option>
</select>

<br>

<button onclick="modoSmart()">📱 Smart</button>
<button onclick="modoPC()">🖥️ PC</button>

<br>

<button onclick="baixar()">📥 Baixar PNG</button>
<button onclick="limpar()">🧹 Limpar</button>

<div id="canvas">
  <div id="qrcode"></div>
  <div id="moldura"></div>
</div>

<div id="galeria"></div>

<script>

const API_KEY = "SUA_API_KEY_AQUI";
const canvas = document.getElementById("canvas");
const qr = document.getElementById("qrcode");

// ================= QR =================
function gerarQR() {
  qr.innerHTML = "";
  new QRCode(qr, {
    text: document.getElementById("link").value,
    width: 200,
    height: 200
  });
}

// ================= BUSCAR =================
async function buscarImagem() {
  const termo = document.getElementById("tema").value;

  const res = await fetch(`https://api.pexels.com/v1/search?query=${termo}&per_page=6`, {
    headers: { Authorization: API_KEY }
  });

  const data = await res.json();
  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  data.photos.forEach(f => {
    const img = document.createElement("img");
    img.src = f.src.medium;

    img.onclick = () => {
      canvas.style.backgroundImage = `url(${f.src.large})`;
    };

    galeria.appendChild(img);
  });
}

// ================= IA AUTO =================
function autoIA() {
  const termo = document.getElementById("tema").value;

  canvas.style.backgroundImage =
    `url(https://source.unsplash.com/900x1600/?${termo},premium,marketing)`;
}

// ================= TEMPLATE =================
function aplicarTemplate(tipo) {
  const moldura = document.getElementById("moldura");

  qr.classList.add("template-qr");

  if (tipo === "promo") {
    moldura.style.backgroundImage =
      "url('https://i.imgur.com/8Km9tLL.png')";
  }

  if (tipo === "luxo") {
    moldura.style.backgroundImage =
      "url('https://i.imgur.com/QZ6FQYk.png')";
  }

  if (tipo === "dark") {
    moldura.style.backgroundImage =
      "url('https://i.imgur.com/3ZQ3Z6F.png')";
  }
}

// ================= MODOS =================
function modoSmart() {
  canvas.style.aspectRatio = "9/16";
}

function modoPC() {
  canvas.style.aspectRatio = "16/9";
}

// ================= DOWNLOAD =================
function baixar() {
  html2canvas(canvas).then(c => {
    const link = document.createElement("a");
    link.download = "qr.png";
    link.href = c.toDataURL();
    link.click();
  });
}

// ================= LIMPAR =================
function limpar() {
  qr.innerHTML = "";
  canvas.style.backgroundImage = "";
  document.getElementById("moldura").style.backgroundImage = "";
}

</script>

</body>
</html>
