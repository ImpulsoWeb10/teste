<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Code Editor Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

#previewBox {
  margin-top: 20px;
  position: relative;
  display: inline-block;
}

#fundo {
  border-radius: 12px;
  display: block;
}

#qrWrapper {
  position: absolute;
  width: 150px;
  height: 150px;
  touch-action: none;
}

#qrcode {
  width: 100%;
  height: 100%;
}

.selected {
  outline: 2px dashed #22c55e;
}
</style>
</head>

<body>

<h2>🎨 QR Code Editor Pro</h2>

<input type="text" id="link" placeholder="Cole seu link aqui">
<br>

<input type="file" id="uploadFundo" accept="image/*">
<br>

<input type="color" id="cor" value="#000000">
<label>Cor do QR</label>
<br>

<button onclick="preview()">👁 Pré-visualizar</button>
<button onclick="baixar()">⬇ Baixar</button>

<div id="previewBox">
  <img id="fundo">
  <div id="qrWrapper">
    <canvas id="qrcode"></canvas>
  </div>
</div>

<script>
const fundo = document.getElementById("fundo");
const qrWrapper = document.getElementById("qrWrapper");
const canvasQR = document.getElementById("qrcode");

let selecionado = null;

/* ===== UPLOAD + AUTO AJUSTE ===== */
document.getElementById("uploadFundo").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    fundo.src = event.target.result;

    fundo.onload = function() {
      const largura = fundo.naturalWidth;
      const altura = fundo.naturalHeight;

      if (largura > altura) {
        fundo.style.width = "500px";
        fundo.style.height = "auto";
      } else {
        fundo.style.height = "500px";
        fundo.style.width = "auto";
      }

      // Centralizar QR
      qrWrapper.style.left = "50%";
      qrWrapper.style.top = "50%";
      qrWrapper.style.transform = "translate(-50%, -50%)";
      qrWrapper.setAttribute("data-x", 0);
      qrWrapper.setAttribute("data-y", 0);
    }
  }

  reader.readAsDataURL(file);
});

/* ===== GERAR QR ===== */
function gerarQR(size = 300) {
  const link = document.getElementById("link").value;
  const cor = document.getElementById("cor").value;

  if (!link) return;

  QRCode.toCanvas(canvasQR, link, {
    width: size,
    margin: 1,
    color: {
      dark: cor,
      light: "#ffffff"
    }
  });
}

function preview() {
  gerarQR(300);
}

/* ===== DOWNLOAD ===== */
function baixar() {
  html2canvas(document.getElementById("previewBox")).then(canvas => {
    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

/* ===== SELEÇÃO ===== */
qrWrapper.addEventListener("click", function(e) {
  e.stopPropagation();
  selecionado = qrWrapper;
  qrWrapper.classList.add("selected");
});

document.addEventListener("click", function() {
  selecionado = null;
  qrWrapper.classList.remove("selected");
});

/* ===== TECLADO ===== */
document.addEventListener("keydown", function(e) {
  if (!selecionado) return;

  let x = parseFloat(selecionado.getAttribute("data-x")) || 0;
  let y = parseFloat(selecionado.getAttribute("data-y")) || 0;

  let passo = 5;
  if (e.shiftKey) passo = 15;
  if (e.altKey) passo = 1;

  if (e.key === "ArrowUp") y -= passo;
  if (e.key === "ArrowDown") y += passo;
  if (e.key === "ArrowLeft") x -= passo;
  if (e.key === "ArrowRight") x += passo;

  selecionado.style.transform = `translate(${x}px, ${y}px)`;
  selecionado.setAttribute("data-x", x);
  selecionado.setAttribute("data-y", y);
});

/* ===== DRAG ===== */
interact(qrWrapper).draggable({
  listeners: {
    move (event) {
      let x = (parseFloat(qrWrapper.getAttribute('data-x')) || 0) + event.dx;
      let y = (parseFloat(qrWrapper.getAttribute('data-y')) || 0) + event.dy;

      qrWrapper.style.transform = `translate(${x}px, ${y}px)`;
      qrWrapper.setAttribute('data-x', x);
      qrWrapper.setAttribute('data-y', y);
    }
  }
});

/* ===== RESIZE REAL (CORRIGIDO) ===== */
interact(qrWrapper).resizable({
  edges: { top: true, left: true, bottom: true, right: true },

  listeners: {
    move (event) {
      let { x, y } = event.target.dataset;

      x = parseFloat(x) || 0;
      y = parseFloat(y) || 0;

      const width = event.rect.width;

      event.target.style.width = width + 'px';
      event.target.style.height = width + 'px'; // mantém quadrado

      x += event.deltaRect.left;
      y += event.deltaRect.top;

      event.target.style.transform = `translate(${x}px, ${y}px)`;

      event.target.setAttribute('data-x', x);
      event.target.setAttribute('data-y', y);

      // 🔥 ATUALIZA QR DE VERDADE
      gerarQR(width);
    }
  }
});
</script>

</body>
</html>
