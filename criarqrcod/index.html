<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Code Inteligente Pro</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

/* CONTAINER DINÂMICO */
#previewBox {
  margin-top: 20px;
  position: relative;
  display: inline-block;
}

/* IMAGEM */
#fundo {
  border-radius: 12px;
  display: block;
}

/* QR */
#qrWrapper {
  position: absolute;
  width: 150px;
  height: 150px;
  touch-action: none;
}

/* CANVAS */
#qrcode {
  width: 100%;
  height: 100%;
}

/* HANDLE */
.resize-handle {
  width: 15px;
  height: 15px;
  background: #22c55e;
  position: absolute;
  right: -8px;
  bottom: -8px;
  cursor: se-resize;
  border-radius: 50%;
}
</style>
</head>

<body>

<h2>🎨 QR Code Inteligente (Auto Ajuste)</h2>

<input type="text" id="link" placeholder="Cole seu link aqui">
<br>

<input type="file" id="uploadFundo" accept="image/*">
<br>

<input type="color" id="cor" value="#000000">
<label>Cor do QR</label>
<br>

<button onclick="preview()">👁 Pré-visualizar</button>
<button onclick="baixar()">⬇ Baixar</button>

<div id="previewBox">
  <img id="fundo">
  
  <div id="qrWrapper">
    <canvas id="qrcode"></canvas>
  </div>
</div>

<script>
const fundo = document.getElementById("fundo");
const qrWrapper = document.getElementById("qrWrapper");

// Upload com ajuste automático
document.getElementById("uploadFundo").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    fundo.src = event.target.result;

    fundo.onload = function() {
      const largura = fundo.naturalWidth;
      const altura = fundo.naturalHeight;

      // Detecta formato
      if (largura > altura) {
        // Horizontal
        fundo.style.width = "500px";
        fundo.style.height = "auto";
      } else {
        // Vertical
        fundo.style.height = "500px";
        fundo.style.width = "auto";
      }

      // Centraliza QR
      qrWrapper.style.left = "50%";
      qrWrapper.style.top = "50%";
      qrWrapper.style.transform = "translate(-50%, -50%)";
      qrWrapper.setAttribute("data-x", 0);
      qrWrapper.setAttribute("data-y", 0);
    }
  }

  reader.readAsDataURL(file);
});

// Gerar QR
function preview() {
  const link = document.getElementById("link").value;
  const cor = document.getElementById("cor").value;

  if (!link) {
    alert("Coloque um link!");
    return;
  }

  QRCode.toCanvas(document.getElementById("qrcode"), link, {
    width: 300,
    margin: 1,
    color: {
      dark: cor,
      light: "#ffffff"
    }
  });
}

// Baixar
function baixar() {
  html2canvas(document.getElementById("previewBox")).then(canvas => {
    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// HANDLE
const handle = document.createElement("div");
handle.classList.add("resize-handle");
qrWrapper.appendChild(handle);

// DRAG
interact(qrWrapper).draggable({
  listeners: {
    move (event) {
      const target = event.target;

      let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
      let y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

      target.style.transform = `translate(${x}px, ${y}px)`;
      target.setAttribute('data-x', x);
      target.setAttribute('data-y', y);
    }
  }
});

// RESIZE
interact(qrWrapper).resizable({
  edges: { right: true, bottom: true },
  listeners: {
    move (event) {
      let { x, y } = event.target.dataset;

      x = parseFloat(x) || 0;
      y = parseFloat(y) || 0;

      event.target.style.width = event.rect.width + 'px';
      event.target.style.height = event.rect.height + 'px';

      event.target.style.transform = `translate(${x}px, ${y}px)`;
    }
  }
});
</script>

</body>
</html>
