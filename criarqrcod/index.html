<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Smart PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
}

/* TOPO */
.topo {
  padding: 15px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
}

/* CANVAS RESPONSIVO */
#canvas {
  width: 90vw;
  max-width: 900px;
  aspect-ratio: 1 / 1;
  margin: 20px auto;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background-size: cover;
  background-position: center;
  border: 2px dashed #444;
}

/* QR */
#qrcode {
  position: absolute;
  width: 25%;
  aspect-ratio: 1 / 1;
  cursor: move;
}

/* RESIZER */
.resizer {
  width: 14px;
  height: 14px;
  background: #00c853;
  position: absolute;
  right: -7px;
  bottom: -7px;
  cursor: se-resize;
}

/* GALERIA */
#galeria {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

#galeria img {
  width: 120px;
  border-radius: 8px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topo">
  <h2>🚀 QR Smart PRO</h2>

  <input id="link" placeholder="Cole seu link">
  <button onclick="gerarQR()">Gerar QR</button>

  <br>

  <input id="tema" placeholder="Buscar imagem">
  <button onclick="buscarImagem()">Buscar</button>
</div>

<div id="canvas">
  <div id="qrcode"></div>
</div>

<div id="galeria"></div>

<script>

// 🔑 SUA API
const API_KEY = "qxw3nmA7rAhdZR232Zs9Iekpcp8c2uQrqSqtUFQNoy1lthAGSGw2LJor";

const qr = document.getElementById("qrcode");

// ================= QR =================
function gerarQR() {
  const link = document.getElementById("link").value;

  qr.innerHTML = "";

  new QRCode(qr, {
    text: link,
    width: 200,
    height: 200
  });
}

// ================= BUSCAR IMAGEM =================
async function buscarImagem() {
  const termo = document.getElementById("tema").value;

  const res = await fetch(`https://api.pexels.com/v1/search?query=${termo}&per_page=8`, {
    headers: { Authorization: API_KEY }
  });

  const data = await res.json();

  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  data.photos.forEach(foto => {
    const img = document.createElement("img");
    img.src = foto.src.medium;

    img.onclick = () => {
      const canvas = document.getElementById("canvas");
      canvas.style.backgroundImage = `url(${foto.src.large})`;

      ajustarCanvas(foto.width, foto.height);
    };

    galeria.appendChild(img);
  });
}

// ================= AJUSTE INTELIGENTE =================
function ajustarCanvas(w, h) {
  const canvas = document.getElementById("canvas");

  if (w > h) {
    canvas.style.aspectRatio = "16 / 9";
  } else {
    canvas.style.aspectRatio = "9 / 16";
  }
}

// ================= ARRASTAR =================
let drag = false, offsetX, offsetY;

qr.addEventListener("mousedown", e => {
  drag = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
});

document.addEventListener("mousemove", e => {
  if (!drag) return;

  const rect = canvas.getBoundingClientRect();

  qr.style.left = (e.clientX - rect.left - offsetX) + "px";
  qr.style.top = (e.clientY - rect.top - offsetY) + "px";
});

document.addEventListener("mouseup", () => drag = false);

// ================= RESIZE =================
const resizer = document.createElement("div");
resizer.className = "resizer";
qr.appendChild(resizer);

let resizing = false;

resizer.addEventListener("mousedown", e => {
  e.stopPropagation();
  resizing = true;
});

document.addEventListener("mousemove", e => {
  if (!resizing) return;

  const rect = qr.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();

  let newWidth = (e.clientX - rect.left);

  let percent = (newWidth / canvasRect.width) * 100;

  if (percent > 10 && percent < 80) {
    qr.style.width = percent + "%";
  }
});

document.addEventListener("mouseup", () => resizing = false);

</script>

</body>
</html>
