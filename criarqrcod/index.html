<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Code com Arte Profissional</title>

<!-- Bibliotecas -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

#previewBox {
  margin-top: 20px;
  position: relative;
  display: inline-block;
}

/* Fundo */
#fundo {
  width: 400px;
  height: 400px;
  object-fit: cover;
  border-radius: 12px;
}

/* QR Container */
#qrWrapper {
  position: absolute;
  width: 180px;
  height: 180px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  touch-action: none;
}

/* QR */
#qrcode {
  width: 100%;
  height: 100%;
}

/* Bolinha de resize */
.resize-handle {
  width: 15px;
  height: 15px;
  background: #22c55e;
  position: absolute;
  right: -8px;
  bottom: -8px;
  cursor: se-resize;
  border-radius: 50%;
}
</style>
</head>

<body>

<h2>🎨 Criador de QR Code Profissional</h2>

<input type="text" id="link" placeholder="Cole seu link aqui">
<br>

<input type="file" id="uploadFundo" accept="image/*">
<br>

<input type="color" id="cor" value="#000000">
<label>Cor do QR</label>
<br>

<button onclick="preview()">👁 Pré-visualizar</button>
<button onclick="baixar()">⬇ Baixar Imagem</button>

<!-- PREVIEW -->
<div id="previewBox">
  <img id="fundo" src="">
  
  <div id="qrWrapper">
    <canvas id="qrcode"></canvas>
  </div>
</div>

<script>
// Upload imagem
let fundoBase64 = "";

document.getElementById("uploadFundo").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    fundoBase64 = event.target.result;
    document.getElementById("fundo").src = fundoBase64;
  }

  reader.readAsDataURL(file);
});

// Gerar QR
function preview() {
  const link = document.getElementById("link").value;
  const cor = document.getElementById("cor").value;
  const canvas = document.getElementById("qrcode");

  if (!link) {
    alert("Coloque um link!");
    return;
  }

  QRCode.toCanvas(canvas, link, {
    width: 300,
    margin: 1,
    color: {
      dark: cor,
      light: "#ffffff"
    }
  });
}

// Baixar imagem
function baixar() {
  const previewBox = document.getElementById("previewBox");

  html2canvas(previewBox).then(canvas => {
    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// DRAG + RESIZE
const qrWrapper = document.getElementById("qrWrapper");

// Criar bolinha
const handle = document.createElement("div");
handle.classList.add("resize-handle");
qrWrapper.appendChild(handle);

// Arrastar
interact(qrWrapper).draggable({
  listeners: {
    move (event) {
      const target = event.target;
      let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
      let y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

      target.style.transform = `translate(${x}px, ${y}px)`;
      target.setAttribute('data-x', x);
      target.setAttribute('data-y', y);
    }
  }
});

// Redimensionar
interact(qrWrapper).resizable({
  edges: { right: true, bottom: true },
  listeners: {
    move (event) {
      let { x, y } = event.target.dataset;

      x = parseFloat(x) || 0;
      y = parseFloat(y) || 0;

      event.target.style.width = event.rect.width + 'px';
      event.target.style.height = event.rect.height + 'px';

      event.target.style.transform = `translate(${x}px, ${y}px)`;
    }
  }
});
</script>

</body>
</html>
