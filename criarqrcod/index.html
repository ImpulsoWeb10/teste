<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}

button, input {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
}

#canvas {
  width: 90vw;
  max-width: 900px;
  aspect-ratio: 1/1;
  margin: 20px auto;
  position: relative;
  background-size: cover;
  background-position: center;
  border-radius: 12px;
  overflow: hidden;
}

#qrcode {
  position: absolute;
  width: 25%;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: move;
  resize: both;
  overflow: auto;
  min-width: 80px;
}

#galeria {
  display: flex;
  overflow-x: auto;
}

#galeria img {
  width: 120px;
  margin: 5px;
  cursor: pointer;
  border-radius: 8px;
}

#preview {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>🚀 QR PRO MAX</h2>

<input id="link" placeholder="Cole seu link">
<button onclick="gerarQR()">Gerar QR</button>

<br>

<input id="tema" placeholder="Tema (ex: ônibus luxo)">
<button onclick="buscarImagem()">🔍 Buscar</button>
<button onclick="autoIA()">🤖 IA</button>

<br>

<button onclick="preview()">👁️ Preview</button>
<button onclick="baixar()">📥 Baixar</button>
<button onclick="limpar()">🧹 Limpar</button>

<div id="canvas">
  <div id="qrcode"></div>
</div>

<div id="galeria"></div>

<div id="preview"></div>

<script>

// 🔑 SUA API
const API_KEY = "qxw3nmA7rAhdZR232Zs9Iekpcp8c2uQrqSqtUFQNoy1lthAGSGw2LJor";

const canvas = document.getElementById("canvas");
const qr = document.getElementById("qrcode");

// ================= QR =================
function gerarQR() {
  const link = document.getElementById("link").value;

  qr.innerHTML = "";

  new QRCode(qr, {
    text: link,
    width: 200,
    height: 200
  });
}

// ================= BUSCAR IMAGEM =================
async function buscarImagem() {
  const termo = document.getElementById("tema").value;

  if (!termo) return alert("Digite um tema");

  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "Carregando...";

  try {
    const res = await fetch(`https://api.pexels.com/v1/search?query=${termo}&per_page=6`, {
      headers: { Authorization: API_KEY }
    });

    const data = await res.json();

    if (!data.photos || data.photos.length === 0) {
      throw "sem resultado";
    }

    galeria.innerHTML = "";

    data.photos.forEach(p => {
      const img = document.createElement("img");
      img.src = p.src.medium;

      img.onclick = () => {
        canvas.style.backgroundImage = `url(${p.src.large})`;
      };

      galeria.appendChild(img);
    });

  } catch (e) {
    // 🔥 FALLBACK
    galeria.innerHTML = "";

    for (let i = 0; i < 5; i++) {
      const img = document.createElement("img");
      img.src = `https://source.unsplash.com/400x400/?${termo}&sig=${Math.random()}`;

      img.onclick = () => {
        canvas.style.backgroundImage = `url(${img.src})`;
      };

      galeria.appendChild(img);
    }
  }
}

// ================= IA =================
function autoIA() {
  const termo = document.getElementById("tema").value;

  if (!termo) return alert("Digite um tema");

  const url = `https://source.unsplash.com/900x1600/?${termo},marketing,ads&${Date.now()}`;

  canvas.style.backgroundImage = `url(${url})`;
}

// ================= PREVIEW =================
function preview() {
  html2canvas(canvas).then(c => {
    const img = document.createElement("img");
    img.src = c.toDataURL();
    img.style.width = "300px";

    const prev = document.getElementById("preview");
    prev.innerHTML = "";
    prev.appendChild(img);
  });
}

// ================= DOWNLOAD =================
function baixar() {
  html2canvas(canvas).then(c => {
    const link = document.createElement("a");
    link.download = "qr.png";
    link.href = c.toDataURL();
    link.click();
  });
}

// ================= LIMPAR =================
function limpar() {
  qr.innerHTML = "";
  canvas.style.backgroundImage = "";
  document.getElementById("galeria").innerHTML = "";
  document.getElementById("preview").innerHTML = "";
}

// ================= DRAG =================
let dragging = false;

qr.addEventListener("mousedown", () => {
  dragging = true;
  qr.style.transform = "none";
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();

  qr.style.left = (e.clientX - rect.left) + "px";
  qr.style.top = (e.clientY - rect.top) + "px";
});

document.addEventListener("mouseup", () => dragging = false);

</script>

</body>
</html>
