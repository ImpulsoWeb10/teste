<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador QR PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
}

#canvas {
  margin: 20px auto;
  border: 2px dashed #aaa;
  position: relative;
  background-size: cover;
  background-position: center;
  width: 600px;
  height: 600px;
  overflow: hidden;
}

#qrcode {
  position: absolute;
  cursor: move;
  border: 2px solid transparent;
}

#qrcode:focus {
  border: 2px dashed red;
}

.resizer {
  width: 15px;
  height: 15px;
  background: red;
  position: absolute;
  right: -8px;
  bottom: -8px;
  cursor: se-resize;
}

#galeria img {
  width: 120px;
  margin: 5px;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>🚀 Gerador de QR Code Inteligente</h2>

<input type="text" id="link" placeholder="Cole seu link">
<button onclick="gerarQR()">Gerar QR</button>

<br><br>

<input type="text" id="tema" placeholder="Buscar imagem (ex: ônibus luxo)">
<button onclick="buscarImagem()">Buscar Imagem</button>

<div id="galeria"></div>

<div id="canvas">
  <div id="qrcode" tabindex="0"></div>
</div>

<script>

// 🔑 SUA API AQUI
const API_KEY = "qxw3nmA7rAhdZR232Zs9Iekpcp8c2uQrqSqtUFQNoy1lthAGSGw2LJor";

let qr = document.getElementById("qrcode");

// ================= QR CODE =================
function gerarQR() {
  const link = document.getElementById("link").value;

  qr.innerHTML = "";

  new QRCode(qr, {
    text: link,
    width: 150,
    height: 150
  });
}

// ================= BUSCAR IMAGEM =================
async function buscarImagem() {
  const termo = document.getElementById("tema").value;

  const res = await fetch(`https://api.pexels.com/v1/search?query=${termo}&per_page=6`, {
    headers: { Authorization: API_KEY }
  });

  const data = await res.json();

  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  data.photos.forEach(foto => {
    const img = document.createElement("img");
    img.src = foto.src.medium;

    img.onclick = () => {
      const canvas = document.getElementById("canvas");

      canvas.style.backgroundImage = `url(${foto.src.large})`;

      ajustarCanvas(foto.width, foto.height);
    };

    galeria.appendChild(img);
  });
}

// ================= AJUSTAR TELA =================
function ajustarCanvas(w, h) {
  const canvas = document.getElementById("canvas");

  if (w > h) {
    canvas.style.width = "800px";
    canvas.style.height = "450px";
  } else {
    canvas.style.width = "450px";
    canvas.style.height = "800px";
  }
}

// ================= ARRASTAR QR =================
let isDragging = false;
let offsetX, offsetY;

qr.addEventListener("mousedown", e => {
  isDragging = true;
  offsetX = e.offsetX;
  offsetY = e.offsetY;
});

document.addEventListener("mousemove", e => {
  if (!isDragging) return;

  const canvas = document.getElementById("canvas");
  const rect = canvas.getBoundingClientRect();

  qr.style.left = (e.clientX - rect.left - offsetX) + "px";
  qr.style.top = (e.clientY - rect.top - offsetY) + "px";
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

// ================= REDIMENSIONAR =================
const resizer = document.createElement("div");
resizer.className = "resizer";
qr.appendChild(resizer);

let resizing = false;

resizer.addEventListener("mousedown", e => {
  e.stopPropagation();
  resizing = true;
});

document.addEventListener("mousemove", e => {
  if (!resizing) return;

  let size = e.clientX - qr.getBoundingClientRect().left;

  if (size > 50) {
    qr.style.width = size + "px";
    qr.style.height = size + "px";
  }
});

document.addEventListener("mouseup", () => {
  resizing = false;
});

// ================= TECLADO =================
document.addEventListener("keydown", e => {
  if (document.activeElement !== qr) return;

  let top = qr.offsetTop;
  let left = qr.offsetLeft;

  if (e.key === "ArrowUp") top -= 5;
  if (e.key === "ArrowDown") top += 5;
  if (e.key === "ArrowLeft") left -= 5;
  if (e.key === "ArrowRight") left += 5;

  qr.style.top = top + "px";
  qr.style.left = left + "px";
});

</script>

</body>
</html>
