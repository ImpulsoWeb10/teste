<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de QR Code Inteligente</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      padding: 30px;
    }

    input, button {
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    input {
      width: 300px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <h1>🔗 Gerador de QR Code Inteligente</h1>

  <input type="text" id="link" placeholder="Cole seu link aqui">
  <br>
  <input type="color" id="cor" value="#000000">
  <label>Cor do QR</label>
  <br>
  <button onclick="gerarQR()">Gerar QR Code</button>

  <br>
  <canvas id="qrcode"></canvas>

  <script>
    function gerarQR() {
      const link = document.getElementById("link").value;
      const cor = document.getElementById("cor").value;
      const canvas = document.getElementById("qrcode");

      if (!link) {
        alert("Coloque um link primeiro!");
        return;
      }

      QRCode.toCanvas(canvas, link, {
        width: 300,
        margin: 2,
        color: {
          dark: cor,
          light: "#ffffff"
        }
      }, function (error) {
        if (error) console.error(error);
      });
    }
  </script>

</body>
</html>
