<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR PRO MAX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
}

.topo {
  padding: 10px;
}

button, input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

button {
  background: #00c853;
  color: white;
  cursor: pointer;
}

/* CANVAS */
#canvas {
  width: 90vw;
  max-width: 900px;
  aspect-ratio: 1/1;
  margin: 20px auto;
  position: relative;
  background-size: cover;
  background-position: center;
  border-radius: 12px;
  overflow: hidden;
  border: 2px dashed #444;
}

/* QR */
#qrcode {
  position: absolute;
  width: 25%;
  aspect-ratio: 1/1;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: move;
  resize: both;
  overflow: auto;
  min-width: 80px;
  max-width: 90%;
}

/* MOLDURA */
#moldura {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* GALERIA */
#galeria {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

#galeria img {
  width: 120px;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

/* LOADING */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="topo">

<h2>🚀 QR PRO MAX</h2>

<input id="link" placeholder="Cole seu link">
<button onclick="gerarQR()">Gerar QR</button>

<br>

<input id="tema" placeholder="Tema (ex: ônibus luxo)">
<button onclick="buscarImagem()">Buscar</button>
<button onclick="autoIA()">🤖 IA Auto</button>

<br>

<select onchange="aplicarTemplate(this.value)">
  <option value="">🎨 Template</option>
  <option value="promo">Promoção</option>
  <option value="luxo">Luxo</option>
  <option value="dark">Dark</option>
</select>

<br>

<button onclick="modoSmart()">📱 Smart</button>
<button onclick="modoPC()">🖥️ PC</button>

<br>

<button onclick="baixar()">📥 Baixar PNG</button>
<button onclick="limpar()">🧹 Limpar</button>

</div>

<div id="canvas">
  <div id="qrcode"></div>
  <div id="moldura"></div>
</div>

<div id="galeria"></div>

<script>

const canvas = document.getElementById("canvas");
const qr = document.getElementById("qrcode");

// ================= QR =================
function gerarQR() {
  const link = document.getElementById("link").value;

  if (!link) {
    alert("Coloque um link");
    return;
  }

  qr.innerHTML = "";

  new QRCode(qr, {
    text: link,
    width: 200,
    height: 200
  });
}

// ================= BUSCAR IMAGEM =================
async function buscarImagem() {
  const termo = document.getElementById("tema").value;

  if (!termo) {
    alert("Digite um tema");
    return;
  }

  const url = `https://source.unsplash.com/400x400/?${encodeURIComponent(termo)}&${Date.now()}`;

  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  for (let i = 0; i < 5; i++) {
    const img = document.createElement("img");
    img.src = `https://source.unsplash.com/400x400/?${encodeURIComponent(termo)}&sig=${Math.random()}`;

    img.onclick = () => {
      canvas.style.backgroundImage = `url(${img.src})`;
    };

    galeria.appendChild(img);
  }
}

// ================= IA AUTO =================
function autoIA() {
  const termo = document.getElementById("tema").value;

  if (!termo) {
    alert("Digite um tema");
    return;
  }

  const loading = document.createElement("div");
  loading.id = "loading";
  loading.innerText = "Gerando imagem...";
  canvas.appendChild(loading);

  const url = `https://source.unsplash.com/900x1600/?${encodeURIComponent(termo)}&${Date.now()}`;

  canvas.style.backgroundImage = "none";

  const img = new Image();

  img.onload = () => {
    canvas.style.backgroundImage = `url(${url})`;
    loading.remove();
  };

  img.onerror = () => {
    loading.innerText = "Erro ao carregar 😢";
  };

  img.src = url;
}

// ================= TEMPLATE =================
function aplicarTemplate(tipo) {
  const moldura = document.getElementById("moldura");

  if (tipo === "promo") {
    moldura.style.background = "linear-gradient(to top, rgba(0,0,0,0.7), transparent)";
    qr.style.top = "75%";
    qr.style.width = "30%";
  }

  if (tipo === "luxo") {
    moldura.style.background = "linear-gradient(135deg, rgba(0,0,0,0.8), rgba(255,215,0,0.3))";
    qr.style.top = "65%";
    qr.style.width = "25%";
  }

  if (tipo === "dark") {
    moldura.style.background = "rgba(0,0,0,0.6)";
    qr.style.top = "70%";
    qr.style.width = "28%";
  }
}

// ================= RESET =================
function resetQR() {
  qr.style.left = "50%";
  qr.style.top = "60%";
  qr.style.width = "25%";
  qr.style.transform = "translate(-50%, -50%)";
}

// ================= MODOS =================
function modoSmart() {
  canvas.style.aspectRatio = "9/16";
  resetQR();
}

function modoPC() {
  canvas.style.aspectRatio = "16/9";
  resetQR();
}

// ================= DOWNLOAD =================
function baixar() {
  html2canvas(canvas).then(c => {
    const link = document.createElement("a");
    link.download = "qr.png";
    link.href = c.toDataURL();
    link.click();
  });
}

// ================= LIMPAR =================
function limpar() {
  qr.innerHTML = "";
  canvas.style.backgroundImage = "";
  document.getElementById("moldura").style.background = "";
  document.getElementById("galeria").innerHTML = "";
}

// ================= DRAG =================
let dragging = false;

qr.addEventListener("mousedown", () => {
  dragging = true;
  qr.style.transform = "none";
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const rect = canvas.getBoundingClientRect();

  qr.style.left = (e.clientX - rect.left) + "px";
  qr.style.top = (e.clientY - rect.top) + "px";
});

document.addEventListener("mouseup", () => dragging = false);

</script>

</body>
</html>
