<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados Delícia</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

header {
  background: #111;
  color: gold;
  padding: 15px;
  text-align: center;
}

.container { padding: 15px; }

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
}

.resumo {
  background: black;
  color: #00ff88;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  font-family: monospace;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
}

.finalizar {
  width: 100%;
  padding: 12px;
  background: #25d366;
  color: white;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="produtos"></div>

<div class="resumo">
<pre id="recibo"></pre>
</div>

<select id="tipo" onchange="toggleEntrega()">
  <option value="Retirada">Retirada</option>
  <option value="Entrega">Entrega</option>
</select>

<div id="campoEndereco" style="display:none;">
  <input id="endereco" placeholder="Endereço">
  <input id="taxa" type="number" placeholder="Taxa" oninput="gerarRecibo()">
</div>

<input id="nome" placeholder="Nome">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
</select>

<input id="desconto" type="number" placeholder="Desconto" oninput="gerarRecibo()">

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6}
];

let carrinho = {};

// 🔥 NUMERO PEDIDO
function gerarNumeroPedido() {
  let numero = localStorage.getItem("pedidoNumero") || 0;
  numero++;
  localStorage.setItem("pedidoNumero", numero);
  return numero;
}

// 📅 DATA
function gerarData() {
  return new Date().toLocaleString();
}

// 🔥 CARREGAR PEDIDO ABERTO
function carregarPedido() {
  let salvo = localStorage.getItem("pedidoAberto");
  if (salvo) {
    carrinho = JSON.parse(salvo);
  }
}

// 🔥 SALVAR
function salvarPedido() {
  localStorage.setItem("pedidoAberto", JSON.stringify(carrinho));
}

function renderProdutos() {
  let html = "";
  produtos.forEach((p,i)=>{
    let qtd = carrinho[i] || 0;
    html += `
    <div class="card">
      ${p.nome} R$${p.preco}
      <div>
        <button onclick="alterar(${i},-1)">-</button>
        <span id="qtd-${i}">${qtd}</span>
        <button onclick="alterar(${i},1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function alterar(i, delta) {
  if (!carrinho[i]) carrinho[i] = 0;
  carrinho[i] += delta;
  if (carrinho[i] < 0) carrinho[i] = 0;

  salvarPedido();
  renderProdutos();
  gerarRecibo();
}

function toggleEntrega() {
  let tipo = document.getElementById("tipo").value;
  document.getElementById("campoEndereco").style.display =
    tipo === "Entrega" ? "block" : "none";
}

function formatarLinha(nome,qtd,sub) {
  let linha = `${nome} x${qtd}`;
  let valor = `R$${sub}`;
  let espacos = 25 - linha.length;
  return linha + " ".repeat(espacos>1?espacos:1) + valor;
}

function gerarRecibo() {
  let texto = "";
  let total = 0;

  produtos.forEach((p,i)=>{
    let qtd = carrinho[i]||0;
    if(qtd>0){
      let sub = qtd*p.preco;
      total+=sub;
      texto+=formatarLinha(p.nome,qtd,sub)+"\n";
    }
  });

  let taxa = parseFloat(document.getElementById("taxa").value)||0;
  let desconto = parseFloat(document.getElementById("desconto").value)||0;

  if(taxa>0){ texto+=`Entrega .... R$${taxa}\n`; total+=taxa; }
  if(desconto>0){ texto+=`Desconto ... -R$${desconto}\n`; total-=desconto; }

  texto+="----------------\n";
  texto+=`TOTAL: R$${total}`;

  document.getElementById("recibo").innerText = texto;
}

function enviar() {

  if(Object.keys(carrinho).length===0){
    alert("Adicione itens");
    return;
  }

  let numeroPedido = gerarNumeroPedido();
  let data = gerarData();

  let mensagem = `📦 Pedido Nº: ${numeroPedido}%0A`;
  mensagem += `📅 ${data}%0A%0A`;

  let total = 0;

  produtos.forEach((p,i)=>{
    let qtd = carrinho[i]||0;
    if(qtd>0){
      let sub = qtd*p.preco;
      total+=sub;
      mensagem+=formatarLinha(p.nome,qtd,sub)+"%0A";
    }
  });

  mensagem+=`%0A💰 TOTAL: R$${total}`;

  window.open(`https://wa.me/5511954950044?text=${mensagem}`);

  // 🔥 LIMPA
  carrinho = {};
  localStorage.removeItem("pedidoAberto");
  renderProdutos();
  gerarRecibo();
}

// INIT
carregarPedido();
renderProdutos();
gerarRecibo();
</script>

</body>
</html>
