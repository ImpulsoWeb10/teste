<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados Delícia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

header {
  background: linear-gradient(45deg, #ff6600, #ff3300);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.controls button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
}

.resumo {
  background: #111;
  color: #00ff88;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  font-family: monospace;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button.finalizar {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #25d366;
  color: white;
  font-size: 16px;
}
</style>

</head>
<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="produtos"></div>

<div class="resumo">
<pre id="recibo"></pre>
</div>

<h3>📦 Tipo de pedido</h3>
<select id="tipo" onchange="toggleEntrega()">
  <option value="Retirada">Retirada no local</option>
  <option value="Entrega">Entrega</option>
</select>

<div id="campoEndereco" style="display:none;">
  <input type="text" id="endereco" placeholder="Endereço de entrega">
  <input type="number" id="taxa" placeholder="Taxa de entrega (R$)" oninput="gerarRecibo()">
</div>

<h3>📋 Dados</h3>
<input type="text" id="nome" placeholder="Seu nome">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<input type="number" id="desconto" placeholder="Desconto (R$)" oninput="gerarRecibo()">

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6},
  {nome: "Enroladinho", preco: 4}
];

let carrinho = {};

function renderProdutos() {
  let html = "";
  produtos.forEach((p, i) => {
    html += `
    <div class="card">
      ${p.nome} - R$${p.preco}
      <div>
        <button onclick="alterar(${i}, -1)">-</button>
        <span id="qtd-${i}">0</span>
        <button onclick="alterar(${i}, 1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function alterar(i, delta) {
  if (!carrinho[i]) carrinho[i] = 0;
  carrinho[i] += delta;
  if (carrinho[i] < 0) carrinho[i] = 0;

  document.getElementById(`qtd-${i}`).innerText = carrinho[i];
  gerarRecibo();
}

function toggleEntrega() {
  let tipo = document.getElementById("tipo").value;
  document.getElementById("campoEndereco").style.display =
    tipo === "Entrega" ? "block" : "none";
  gerarRecibo();
}

function formatarLinha(nome, qtd, subtotal) {
  let linha = `${nome} x${qtd}`;
  let valor = `R$${subtotal}`;
  let espacos = 25 - linha.length;
  if (espacos < 1) espacos = 1;
  return linha + " ".repeat(espacos) + valor;
}

function gerarRecibo() {
  let texto = "=== PEDIDO ===\n";
  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;
      texto += formatarLinha(p.nome, qtd, subtotal) + "\n";
    }
  });

  let taxa = parseFloat(document.getElementById("taxa").value) || 0;
  let desconto = parseFloat(document.getElementById("desconto").value) || 0;

  if (taxa > 0) {
    texto += `Entrega${" ".repeat(18)}R$${taxa}\n`;
    total += taxa;
  }

  if (desconto > 0) {
    texto += `Desconto${" ".repeat(17)}-R$${desconto}\n`;
    total -= desconto;
  }

  texto += "-------------------------\n";
  texto += `TOTAL: R$ ${total}`;

  document.getElementById("recibo").innerText = texto;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let tipo = document.getElementById("tipo").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;
  let taxa = parseFloat(document.getElementById("taxa").value) || 0;
  let desconto = parseFloat(document.getElementById("desconto").value) || 0;

  let mensagem = `🍟 *Salgados Delícia*%0A`;
  mensagem += `Cliente: ${nome}%0A`;
  mensagem += `Tipo: ${tipo}%0A`;

  if (tipo === "Entrega") {
    mensagem += `Endereço: ${endereco}%0A`;
  }

  mensagem += `Pagamento: ${pagamento}%0A%0A`;
  mensagem += `🧾 *Recibo*%0A`;

  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;
      mensagem += formatarLinha(p.nome, qtd, subtotal) + "%0A";
    }
  });

  if (taxa > 0) {
    mensagem += `Entrega .......... R$${taxa}%0A`;
    total += taxa;
  }

  if (desconto > 0) {
    mensagem += `Desconto ......... -R$${desconto}%0A`;
    total -= desconto;
  }

  mensagem += "--------------------%0A";
  mensagem += `💰 *TOTAL: R$ ${total}*`;

  let numero = "5511954950044";

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}

renderProdutos();
</script>

</body>
</html>
