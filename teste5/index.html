<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedidos de Salgados</title>

<style>
body {
  font-family: Arial;
  background: #fff8f0;
  padding: 15px;
}

h1 {
  text-align: center;
}

.produto {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

.total {
  font-size: 18px;
  text-align: center;
  font-weight: bold;
  margin-top: 10px;
}

.finalizar {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  font-size: 16px;
}
</style>

</head>
<body>

<h1>🍟 Salgados Delícia</h1>

<div id="lista"></div>

<div class="total">Total: R$ <span id="total">0</span></div>

<h3>Seus dados:</h3>
<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Endereço">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<button class="finalizar" onclick="enviarPedido()">Finalizar no WhatsApp</button>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6},
  {nome: "Enroladinho", preco: 4}
];

let carrinho = [];

function render() {
  let html = "";
  produtos.forEach((p, i) => {
    html += `
    <div class="produto">
      ${p.nome} - R$${p.preco}
      <button onclick="add(${i})">+</button>
    </div>`;
  });
  document.getElementById("lista").innerHTML = html;
}

function add(i) {
  carrinho.push(produtos[i]);
  calcular();
}

function calcular() {
  let total = carrinho.reduce((s, p) => s + p.preco, 0);
  document.getElementById("total").innerText = total;
}

function enviarPedido() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  let resumo = "";
  carrinho.forEach(p => {
    resumo += `- ${p.nome} (R$${p.preco})%0A`;
  });

  let total = document.getElementById("total").innerText;

  let mensagem = `🍟 *Pedido de Salgados*%0A
Nome: ${nome}%0A
Endereço: ${endereco}%0A
Pagamento: ${pagamento}%0A
%0AItens:%0A${resumo}
%0ATotal: R$ ${total}`;

  let numero = "5511954950044"; // TROCA AQUI

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}

render();
</script>

</body>
</html>
