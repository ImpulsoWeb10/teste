<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Salgados Delícia</title>

<style>
body {
  font-family: monospace;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #ff6600;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  padding: 15px;
}

.produto {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

.controls button {
  padding: 5px 10px;
}

.resumo {
  background: #000;
  color: #00ff88;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
  font-size: 14px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

button.finalizar {
  width: 100%;
  padding: 12px;
  background: #25d366;
  color: white;
  border: none;
  margin-top: 15px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

</style>
</head>
<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="produtos"></div>

<div class="resumo">
<pre id="recibo"></pre>
</div>

<h3>📋 Dados</h3>
<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Endereço">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6},
  {nome: "Enroladinho", preco: 4}
];

let carrinho = {};

function renderProdutos() {
  let html = "";
  produtos.forEach((p, i) => {
    html += `
    <div class="produto">
      ${p.nome} - R$${p.preco}
      <div class="controls">
        <button onclick="alterar(${i}, -1)">-</button>
        <span id="qtd-${i}">0</span>
        <button onclick="alterar(${i}, 1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function alterar(i, delta) {
  if (!carrinho[i]) carrinho[i] = 0;
  carrinho[i] += delta;
  if (carrinho[i] < 0) carrinho[i] = 0;

  document.getElementById(`qtd-${i}`).innerText = carrinho[i];
  gerarRecibo();
}

function formatarLinha(nome, qtd, preco, subtotal) {
  let linha = `${nome} x${qtd}`;
  let valor = `R$${subtotal}`;

  // espaçamento tipo recibo
  let espacos = 25 - linha.length;
  if (espacos < 1) espacos = 1;

  return linha + " ".repeat(espacos) + valor;
}

function gerarRecibo() {
  let texto = "=== PEDIDO ===\n";
  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;

      texto += formatarLinha(p.nome, qtd, p.preco, subtotal) + "\n";
    }
  });

  texto += "-------------------------\n";
  texto += `TOTAL: R$ ${total}`;

  document.getElementById("recibo").innerText = texto;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  let mensagem = `🍟 *Salgados Delícia*%0A`;
  mensagem += `Cliente: ${nome}%0A`;
  mensagem += `Endereço: ${endereco}%0A`;
  mensagem += `Pagamento: ${pagamento}%0A%0A`;

  mensagem += `🧾 *Recibo*%0A`;

  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;

      let linha = formatarLinha(p.nome, qtd, p.preco, subtotal);
      mensagem += linha + "%0A";
    }
  });

  mensagem += "--------------------%0A";
  mensagem += `💰 *TOTAL: R$ ${total}*`;

  let numero = "5511954950044"; // TROCAR

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}

renderProdutos();
</script>

</body>
</html>
