<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados Delícia</title>

<style>
body {margin:0;font-family:Arial;background:#f2f2f2;}

header {
  background:#111;
  color:gold;
  padding:15px;
  text-align:center;
}

.container {padding:15px;}

.card {
  background:white;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

button {
  background:#ff6600;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:6px;
}

.resumo {
  background:black;
  color:#00ff88;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  font-family:monospace;
}

input,select {
  width:100%;
  padding:10px;
  margin-top:8px;
}

.finalizar {
  width:100%;
  padding:12px;
  background:#25d366;
}

/* 🔥 MODAL LUXO */
.modal {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:#000;
  color:gold;
  padding:25px;
  border-radius:15px;
  text-align:center;
  border:2px solid gold;
  box-shadow:0 0 25px gold,0 0 60px rgba(255,215,0,0.5);
}

.barra {
  width:100%;
  height:5px;
  background:#222;
  margin-top:15px;
  overflow:hidden;
}

#progresso {
  height:100%;
  width:0%;
  background:gold;
  animation:carregar 5s linear forwards;
}

@keyframes carregar {
  from{width:0%;}
  to{width:100%;}
}
</style>
</head>

<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="infoPedido"></div>

<div id="produtos"></div>

<div class="resumo">
<pre id="recibo"></pre>
</div>

<select id="tipo" onchange="toggleEntrega()">
<option value="Retirada">Retirada</option>
<option value="Entrega">Entrega</option>
</select>

<div id="campoEndereco" style="display:none;">
<input id="endereco" placeholder="Endereço">
<input id="taxa" type="number" placeholder="Taxa" oninput="gerarRecibo()">
</div>

<input id="nome" placeholder="Nome">

<select id="pagamento">
<option>Dinheiro</option>
<option>Pix</option>
</select>

<input id="desconto" type="number" placeholder="Desconto" oninput="gerarRecibo()">

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2>Pedido registrado</h2>
    <p>Estamos preparando seu pedido ✨</p>
    <div class="barra"><div id="progresso"></div></div>
  </div>
</div>

<script>
let produtos=[
{nome:"Coxinha",preco:5},
{nome:"Kibe",preco:5},
{nome:"Esfiha",preco:6}
];

let carrinho={};
let numeroPedido=null;
let dataPedido=null;

// 🔥 INICIAR OU CONTINUAR PEDIDO
function iniciarPedido(){
  let salvo=localStorage.getItem("pedidoAberto");

  if(salvo){
    let dados=JSON.parse(salvo);
    carrinho=dados.carrinho;
    numeroPedido=dados.numero;
    dataPedido=dados.data;
  }else{
    numeroPedido=(localStorage.getItem("numero")||0);
    numeroPedido++;
    localStorage.setItem("numero",numeroPedido);

    dataPedido=new Date().toLocaleString();
  }

  mostrarInfo();
}

// 🔥 SALVAR
function salvarPedido(){
  localStorage.setItem("pedidoAberto",JSON.stringify({
    carrinho,
    numero:numeroPedido,
    data:dataPedido
  }));
}

// 🔥 MOSTRAR INFO
function mostrarInfo(){
  document.getElementById("infoPedido").innerHTML=
  `📦 Pedido Nº: ${numeroPedido}<br>📅 ${dataPedido}`;
}

// PRODUTOS
function renderProdutos(){
  let html="";
  produtos.forEach((p,i)=>{
    let qtd=carrinho[i]||0;
    html+=`
    <div class="card">
      ${p.nome} R$${p.preco}
      <div>
        <button onclick="alterar(${i},-1)">-</button>
        <span>${qtd}</span>
        <button onclick="alterar(${i},1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML=html;
}

function alterar(i,d){
  if(!carrinho[i])carrinho[i]=0;
  carrinho[i]+=d;
  if(carrinho[i]<0)carrinho[i]=0;

  salvarPedido();
  renderProdutos();
  gerarRecibo();
}

function toggleEntrega(){
  let tipo=document.getElementById("tipo").value;
  document.getElementById("campoEndereco").style.display=
  tipo==="Entrega"?"block":"none";
}

function gerarRecibo(){
  let texto="";
  let total=0;

  produtos.forEach((p,i)=>{
    let qtd=carrinho[i]||0;
    if(qtd>0){
      let sub=qtd*p.preco;
      total+=sub;
      texto+=`${p.nome} x${qtd} .... R$${sub}\n`;
    }
  });

  document.getElementById("recibo").innerText=texto+"\nTOTAL: R$"+total;
}

// 🔥 FINALIZAR
function enviar(){

  document.getElementById("modal").style.display="flex";

  let mensagem=`📦 Pedido Nº: ${numeroPedido}%0A📅 ${dataPedido}%0A%0A`;

  let total=0;

  produtos.forEach((p,i)=>{
    let qtd=carrinho[i]||0;
    if(qtd>0){
      let sub=qtd*p.preco;
      total+=sub;
      mensagem+=`${p.nome} x${qtd} R$${sub}%0A`;
    }
  });

  mensagem+=`%0A💰 TOTAL: R$${total}`;

  let barra=document.getElementById("progresso");
  barra.style.animation="none";
  barra.offsetHeight;
  barra.style.animation="carregar 5s linear forwards";

  setTimeout(()=>{
    window.open(`https://wa.me/5511954950044?text=${mensagem}`);

    // LIMPA PEDIDO
    localStorage.removeItem("pedidoAberto");
    carrinho={};
    iniciarPedido();
    renderProdutos();
    gerarRecibo();

    document.getElementById("modal").style.display="none";
  },5000);
}

// INIT
iniciarPedido();
renderProdutos();
gerarRecibo();
</script>

</body>
</html>
