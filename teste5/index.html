<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema PRO+ Salgados</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header{background:#000;color:gold;text-align:center;padding:15px;font-size:20px}
.container{padding:15px}
.card{background:#1a1a1a;margin:10px 0;padding:12px;border-radius:12px;display:flex;justify-content:space-between;align-items:center}
button{border:none;padding:6px 12px;border-radius:6px;background:#ff6600;color:#fff;cursor:pointer}
.finalizar{width:100%;padding:14px;background:#25d366;font-size:16px}
.resumo{background:#000;color:#00ff88;padding:10px;border-radius:10px;font-family:monospace}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.preparo{background:orange}
.pronto{background:green}
.entregue{background:blue}
.floating{position:fixed;bottom:20px;right:20px;background:#000;color:gold;padding:15px;border-radius:50%;box-shadow:0 0 15px gold;cursor:pointer}

/* MODAL LUXO */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9)}
.modal-box{background:#000;color:gold;padding:25px;border-radius:15px;border:2px solid gold;box-shadow:0 0 30px gold,0 0 60px rgba(255,215,0,0.4)}
.barra{height:5px;background:#222;margin-top:10px}
#bar{height:5px;width:0;background:gold;animation:load 5s linear forwards}
@keyframes load{from{width:0}to{width:100%}}

.painel{background:#111;padding:10px;margin-top:15px;border-radius:10px}
.pedido-item{border-bottom:1px solid #333;padding:8px}
</style>
</head>

<body>
<header>🍟 Sistema Profissional</header>

<div class="container">
<div id="info"></div>
<div id="produtos"></div>

<div class="resumo"><pre id="recibo"></pre></div>

<input id="nome" placeholder="Nome">
<select id="tipo" onchange="toggle()">
<option>Retirada</option>
<option>Entrega</option>
</select>
<div id="end" style="display:none">
<input id="endereco" placeholder="Endereço">
<input id="taxa" type="number" placeholder="Taxa" oninput="recibo()">
</div>
<input id="desconto" type="number" placeholder="Desconto" oninput="recibo()">

<button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>

<div class="painel">
<h3>📊 Painel de Pedidos</h3>
<div id="listaPedidos"></div>
</div>

</div>

<div class="floating" onclick="abrirPainel()">📋</div>

<div id="modal" class="modal">
<div class="modal-box">
<h2>Pedido registrado</h2>
<div class="barra"><div id="bar"></div></div>
</div>
</div>

<script>
let produtos=[{n:"Coxinha",p:5},{n:"Kibe",p:5},{n:"Esfiha",p:6}];
let carrinho={};
let numero=0;
let data="";

function init(){
let salvo=localStorage.getItem("aberto");
if(salvo){let d=JSON.parse(salvo);carrinho=d.c;numero=d.n;data=d.dt}
else{numero=(localStorage.getItem("num")||0);numero++;localStorage.setItem("num",numero);data=new Date().toLocaleString()}
info();render();recibo();listarPedidos();}

function save(){localStorage.setItem("aberto",JSON.stringify({c:carrinho,n:numero,dt:data}))}

function info(){document.getElementById("info").innerHTML=`📦 Pedido #${numero}<br>${data}`}

function render(){let h="";produtos.forEach((p,i)=>{let q=carrinho[i]||0;h+=`<div class='card'>${p.n} R$${p.p}<div><button onclick='alt(${i},-1)'>-</button> ${q} <button onclick='alt(${i},1)'>+</button></div></div>`});document.getElementById("produtos").innerHTML=h}

function alt(i,d){if(!carrinho[i])carrinho[i]=0;carrinho[i]+=d;if(carrinho[i]<0)carrinho[i]=0;save();render();recibo()}

function toggle(){document.getElementById("end").style.display=document.getElementById("tipo").value=="Entrega"?"block":"none"}

function recibo(){let t="";let total=0;produtos.forEach((p,i)=>{let q=carrinho[i]||0;if(q>0){let s=q*p.p;total+=s;t+=`${p.n} x${q} R$${s}\n`}});
let taxa=parseFloat(document.getElementById("taxa").value)||0;
let desc=parseFloat(document.getElementById("desconto").value)||0;
total=total+taxa-desc;

document.getElementById("recibo").innerText=t+`\nTOTAL R$${total}`}

function finalizar(){
document.getElementById("modal").style.display="flex";
setTimeout(()=>{
let msg=`📦 Pedido #${numero}%0A${data}%0A`;
produtos.forEach((p,i)=>{let q=carrinho[i]||0;if(q>0){msg+=`${p.n} x${q}%0A`}});
window.open(`https://wa.me/5511954950044?text=${msg}`);

let hist=JSON.parse(localStorage.getItem("hist")||"[]");
hist.push({n:numero,dt:data,status:"preparo"});
localStorage.setItem("hist",JSON.stringify(hist));

localStorage.removeItem("aberto");carrinho={};init();document.getElementById("modal").style.display="none";
},5000)}

function listarPedidos(){
let hist=JSON.parse(localStorage.getItem("hist")||"[]");
let html="";
hist.forEach((p,i)=>{
html+=`<div class='pedido-item'>
Pedido #${p.n} - ${p.dt}<br>
<span class='badge ${p.status}'>${p.status}</span>
<button onclick='mudar(${i},"preparo")'>🟡</button>
<button onclick='mudar(${i},"pronto")'>🟢</button>
<button onclick='mudar(${i},"entregue")'>🔵</button>
</div>`});
document.getElementById("listaPedidos").innerHTML=html}
