<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados Delícia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

header {
  background: linear-gradient(45deg, #ff6600, #ff3300);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.nome {
  font-weight: bold;
}

.preco {
  color: #666;
  font-size: 14px;
}

.controls button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 16px;
}

.controls span {
  margin: 0 8px;
  font-weight: bold;
}

.resumo {
  background: #111;
  color: #00ff88;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  font-family: monospace;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button.finalizar {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: #25d366;
  color: white;
  font-size: 16px;
  font-weight: bold;
}
</style>

</head>
<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="produtos"></div>

<div class="resumo">
<pre id="recibo"></pre>
</div>

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Endereço">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6},
  {nome: "Enroladinho", preco: 4}
];

let carrinho = {};

function renderProdutos() {
  let html = "";
  produtos.forEach((p, i) => {
    html += `
    <div class="card">
      <div>
        <div class="nome">${p.nome}</div>
        <div class="preco">R$ ${p.preco}</div>
      </div>
      <div class="controls">
        <button onclick="alterar(${i}, -1)">-</button>
        <span id="qtd-${i}">0</span>
        <button onclick="alterar(${i}, 1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function alterar(i, delta) {
  if (!carrinho[i]) carrinho[i] = 0;
  carrinho[i] += delta;
  if (carrinho[i] < 0) carrinho[i] = 0;

  document.getElementById(`qtd-${i}`).innerText = carrinho[i];
  gerarRecibo();
}

function formatarLinha(nome, qtd, subtotal) {
  let linha = `${nome} x${qtd}`;
  let valor = `R$${subtotal}`;
  let espacos = 25 - linha.length;
  if (espacos < 1) espacos = 1;
  return linha + " ".repeat(espacos) + valor;
}

function gerarRecibo() {
  let texto = "=== PEDIDO ===\n";
  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;
      texto += formatarLinha(p.nome, qtd, subtotal) + "\n";
    }
  });

  texto += "-------------------------\n";
  texto += `TOTAL: R$ ${total}`;

  document.getElementById("recibo").innerText = texto;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  let mensagem = `🍟 *Salgados Delícia*%0A`;
  mensagem += `Cliente: ${nome}%0A`;
  mensagem += `Endereço: ${endereco}%0A`;
  mensagem += `Pagamento: ${pagamento}%0A%0A`;
  mensagem += `🧾 *Recibo*%0A`;

  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;
      mensagem += formatarLinha(p.nome, qtd, subtotal) + "%0A";
    }
  });

  mensagem += "--------------------%0A";
  mensagem += `💰 *TOTAL: R$ ${total}*`;

  let numero = "5511954950044"; // TROCAR

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}

renderProdutos();
</script>

</body>
</html>
