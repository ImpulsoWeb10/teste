<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados Delícia PRO</title>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2}
header{background:#000;color:gold;text-align:center;padding:15px}
.container{padding:15px}
input,select{width:100%;padding:10px;margin-top:8px}
button{border:none;padding:8px 12px;border-radius:6px;background:#ff6600;color:#fff}
.finalizar{width:100%;padding:14px;background:#25d366;margin-top:10px}

.resumo{background:#000;color:#00ff88;padding:10px;border-radius:10px;margin-top:10px;font-family:monospace}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9)}
.modal-box{background:#000;color:gold;padding:25px;border-radius:15px;border:2px solid gold;box-shadow:0 0 30px gold}
.barra{height:5px;background:#222;margin-top:10px}
#bar{height:5px;width:0;background:gold;animation:load 5s linear forwards}
@keyframes load{from{width:0}to{width:100%}}

/* LISTA */
.item{display:flex;justify-content:space-between;background:#fff;margin-top:8px;padding:10px;border-radius:10px}
</style>
</head>

<body>
<header>🍟 Salgados Delícia</header>

<div class="container">

<!-- INFO -->
<div id="info"></div>

<input id="nome" placeholder="Nome do Cliente">
<input id="telefone" placeholder="Telefone">

<select id="consumo">
<option>Consumir no local</option>
<option>Viagem</option>
</select>

<h3>🍟 Salgados</h3>
<div id="salgados"></div>

<h3>🥤 Bebidas</h3>
<div id="bebidas"></div>

<div class="resumo"><pre id="recibo"></pre></div>

<button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h2>Obrigado!</h2>
<p>Seu pedido está sendo criado!</p>
<div class="barra"><div id="bar"></div></div>
</div>
</div>

<script>
let salgados=[{n:"Coxinha",p:5},{n:"Kibe",p:5},{n:"Esfiha",p:6}];
let bebidas=[{n:"Refrigerante",p:6},{n:"Suco",p:5}];

let carrinho={};
let numero=0;
let data="";

function init(){
numero=(localStorage.getItem("num")||0);numero++;
localStorage.setItem("num",numero);
data=new Date().toLocaleString();

info();render();recibo();}

function info(){
document.getElementById("info").innerHTML=`📦 Pedido Nº ${numero}<br>📅 ${data}`}

function render(){
let h1="";
salgados.forEach((p,i)=>{
let q=carrinho["s"+i]||0;
h1+=`<div class='item'>${p.n} R$${p.p}<div><button onclick='alt("s${i}",-1)'>-</button> ${q} <button onclick='alt("s${i}",1)'>+</button></div></div>`});

document.getElementById("salgados").innerHTML=h1;

let h2="";
bebidas.forEach((p,i)=>{
let q=carrinho["b"+i]||0;
h2+=`<div class='item'>${p.n} R$${p.p}<div><button onclick='alt("b${i}",-1)'>-</button> ${q} <button onclick='alt("b${i}",1)'>+</button></div></div>`});

document.getElementById("bebidas").innerHTML=h2;
}

function alt(id,d){
if(!carrinho[id])carrinho[id]=0;
carrinho[id]+=d;
if(carrinho[id]<0)carrinho[id]=0;
render();recibo();}

function recibo(){
let txt="";
let total=0;

salgados.forEach((p,i)=>{
let q=carrinho["s"+i]||0;
if(q>0){let s=q*p.p;total+=s;txt+=`${p.n} x${q} R$${s}\n`}});

bebidas.forEach((p,i)=>{
let q=carrinho["b"+i]||0;
if(q>0){let s=q*p.p;total+=s;txt+=`${p.n} x${q} R$${s}\n`}});

let nome=document.getElementById("nome").value;
let tel=document.getElementById("telefone").value;
let consumo=document.getElementById("consumo").value;

let topo=`Cliente: ${nome}\nTel: ${tel}\nTipo: ${consumo}\n\n`;

document.getElementById("recibo").innerText=topo+txt+`\nTOTAL R$${total}`}

function finalizar(){

document.getElementById("modal").style.display="flex";

setTimeout(()=>{
let msg=encodeURIComponent(document.getElementById("recibo").innerText);
window.open(`https://wa.me/5511954950044?text=${msg}`);
document.getElementById("modal").style.display="none";
},5000);
}

init();
</script>

</body>
</html>
