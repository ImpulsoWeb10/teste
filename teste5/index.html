<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Salgados Delícia</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #ff6600;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

.container {
  padding: 15px;
}

.produto {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls button {
  padding: 5px 10px;
  margin: 0 2px;
}

.resumo {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 15px;
}

.total {
  font-weight: bold;
  font-size: 18px;
  text-align: center;
  margin-top: 10px;
}

button.finalizar {
  width: 100%;
  padding: 12px;
  background: #25d366;
  color: white;
  border: none;
  font-size: 16px;
  margin-top: 15px;
  border-radius: 8px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
</style>

</head>
<body>

<header>🍟 Salgados Delícia</header>

<div class="container">

<div id="produtos"></div>

<div class="resumo">
  <h3>🧾 Resumo do Pedido</h3>
  <div id="resumo"></div>
  <div class="total">Total: R$ <span id="total">0</span></div>
</div>

<h3>📋 Seus dados</h3>
<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Endereço">

<select id="pagamento">
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
</select>

<button class="finalizar" onclick="enviar()">Finalizar Pedido</button>

</div>

<script>
let produtos = [
  {nome: "Coxinha", preco: 5},
  {nome: "Kibe", preco: 5},
  {nome: "Esfiha", preco: 6},
  {nome: "Enroladinho", preco: 4}
];

let carrinho = {};

function renderProdutos() {
  let html = "";
  produtos.forEach((p, i) => {
    html += `
    <div class="produto">
      ${p.nome} - R$${p.preco}
      <div class="controls">
        <button onclick="alterar(${i}, -1)">-</button>
        <span id="qtd-${i}">0</span>
        <button onclick="alterar(${i}, 1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById("produtos").innerHTML = html;
}

function alterar(i, delta) {
  if (!carrinho[i]) carrinho[i] = 0;
  carrinho[i] += delta;
  if (carrinho[i] < 0) carrinho[i] = 0;

  document.getElementById(`qtd-${i}`).innerText = carrinho[i];
  atualizarResumo();
}

function atualizarResumo() {
  let resumo = "";
  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;

      resumo += `${p.nome} x${qtd} = R$${subtotal}<br>`;
    }
  });

  document.getElementById("resumo").innerHTML = resumo || "Nenhum item ainda";
  document.getElementById("total").innerText = total;
}

function enviar() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;

  let mensagem = `🍟 *Salgados Delícia*%0A`;
  mensagem += `📋 *Pedido do Cliente*%0A`;
  mensagem += `Nome: ${nome}%0A`;
  mensagem += `Endereço: ${endereco}%0A`;
  mensagem += `Pagamento: ${pagamento}%0A%0A`;

  mensagem += `🧾 *Itens do Pedido:*%0A`;

  let total = 0;

  produtos.forEach((p, i) => {
    let qtd = carrinho[i] || 0;
    if (qtd > 0) {
      let subtotal = qtd * p.preco;
      total += subtotal;

      mensagem += `➡️ ${p.nome}%0A`;
      mensagem += `Qtd: ${qtd} | Unit: R$${p.preco}%0A`;
      mensagem += `Subtotal: R$${subtotal}%0A%0A`;
    }
  });

  mensagem += `💰 *TOTAL: R$ ${total}*`;

  let numero = "5511954950044"; // TROCA AQUI

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}

renderProdutos();
</script>

</body>
</html>
