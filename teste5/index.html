<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedidos de Salgados</title>

<style>
body {
  font-family: Arial;
  background: #fff8f0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 10px;
  background: #ff6600;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

.total {
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}
</style>

</head>
<body>

<h1>🍟 Pedido de Salgados</h1>

<div class="card">
  <label>Produto:</label>
  <select id="produto">
    <option value="Coxinha - 5">Coxinha - R$5</option>
    <option value="Kibe - 5">Kibe - R$5</option>
    <option value="Esfiha - 6">Esfiha - R$6</option>
    <option value="Enroladinho - 4">Enroladinho - R$4</option>
  </select>

  <label>Quantidade:</label>
  <input type="number" id="qtd" value="1" min="1" onchange="calcular()">
</div>

<div class="card total">
  Total: R$ <span id="total">5</span>
</div>

<button onclick="enviarPedido()">Finalizar Pedido no WhatsApp</button>

<script>
function calcular() {
  let produto = document.getElementById("produto").value;
  let qtd = document.getElementById("qtd").value;

  let preco = produto.split(" - ")[1];
  let total = preco * qtd;

  document.getElementById("total").innerText = total;
}

function enviarPedido() {
  let produto = document.getElementById("produto").value;
  let qtd = document.getElementById("qtd").value;
  let total = document.getElementById("total").innerText;

  let mensagem = `🍟 *Pedido de Salgados*%0A
Produto: ${produto}%0A
Quantidade: ${qtd}%0A
Total: R$ ${total}`;

  let numero = "5511954950044"; // ALTERA AQUI

  window.open(`https://wa.me/${numero}?text=${mensagem}`);
}
</script>

</body>
</html>
