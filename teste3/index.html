<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impulso Web 10 - Final Lux</title>
    <style>
        :root { --bg: #050707; --card: #0d1212; --green: #38e391; --blue: #007bff; --yellow: #ffcc00; --text: #f0f0f0; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; padding-top: 180px; padding-bottom: 120px; }
        
        /* TOPO COM LUZ BRANCA RELUZENTE */
        .header-cadastro { 
            background: #000; padding: 15px; border-bottom: 1px solid #444; 
            position: fixed; top: 0; left: 0; width: 100%; display: grid; 
            grid-template-columns: 1fr 1fr 1fr; gap: 10px; box-sizing: border-box; z-index: 10;
        }
        .header-cadastro input { 
            background: #000; border: 1px solid #fff; color: #fff; padding: 10px; 
            border-radius: 5px; font-size: 0.8rem; width: 100%; box-sizing: border-box;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3); /* Luz Branca */
        }
        .full { grid-column: span 3; }
        .btn-add { 
            grid-column: span 3; background: #fff; color: #000; 
            border: none; padding: 12px; border-radius: 5px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6); /* Luz Branca Reluzente */
        }

        /* GRID */
        .grid-clientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; }
        .card-cliente { background: var(--card); border: 1px solid #1a2222; padding: 12px; border-radius: 10px; cursor: pointer; }
        .card-cliente h3 { margin: 0 0 10px 0; font-size: 0.8rem; color: var(--green); border-bottom: 1px solid #222; padding-bottom: 5px; }
        .card-split { display: flex; flex-direction: column; gap: 6px; font-size: 0.7rem; }
        .split-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #1a2222; }

        /* RODAPÉ NEON COLORIDO */
        .footer-somas { 
            display: flex; gap: 10px; position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; padding: 15px; border-top: 2px solid #222; box-sizing: border-box; z-index: 10;
        }
        .stat-card { background: #080a0a; border-radius: 8px; flex: 1; text-align: center; padding: 10px; border: 2px solid transparent; }
        .stat-card.blue { border-color: var(--blue); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        .stat-card.pend { border-color: #fff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .stat-card.total { border-color: var(--green); box-shadow: 0 0 15px rgba(56, 227, 145, 0.5); }
        .stat-card h2 { margin: 0; font-size: 0.9rem; font-weight: bold; }
        .stat-card.blue h2 { color: var(--blue); }
        .stat-card.total h2 { color: var(--green); }

        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #111; padding: 25px; border-radius: 15px; width: 310px; border: 1px solid #333; }
        .edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .edit-row input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; width: 90px; }
        .btn-st { flex: 1; padding: 12px; border-radius: 5px; border: 2px solid transparent; font-weight: bold; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; }
        .st-azul { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px rgba(0,123,255,0.4); }
        .st-verde { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(56,227,145,0.4); }
        .st-amarelo { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 10px rgba(255,204,0,0.4); }
        .st-branco { border-color: #fff; color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="header-cadastro">
        <input type="text" id="novoNome" class="full" placeholder="NOME DO CLIENTE">
        <input type="number" id="novoLink" placeholder="LINK R$">
        <input type="number" id="novoLan" placeholder="LANPAGE R$">
        <input type="number" id="novoMan" placeholder="MANUT R$">
        <button class="btn-add" onclick="adicionarCliente()">CADASTRAR CLIENTE</button>
    </div>

    <div class="grid-clientes" id="gridDisplay"></div>

    <div class="footer-somas">
        <div class="stat-card blue"><small style="color:#888; font-size:10px;">RECEBIDO</small><h2 id="somaRecebido">R$ 0,00</h2></div>
        <div class="stat-card pend"><small style="color:#888; font-size:10px;">A RECEBER</small><h2 id="somaAReceber">R$ 0,00</h2></div>
        <div class="stat-card total"><small style="color:#888; font-size:10px;">TOTAL GERAL</small><h2 id="somaTotal">R$ 0,00</h2></div>
    </div>

    <div id="modalCtrl" class="modal"><div class="modal-content" id="modalInterno"></div></div>

    <script>
        const listaOficial = [
            { id: 1, cl: "Amor por Patinhas", lk: 50, stL: "azul", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 2, cl: "Itapuã Center", lk: 59.9, stL: "azul", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 3, cl: "Óptica Lionda I", lk: 50, stL: "amarelo", ln: 0, stLn: "branco", mn: 20, stM: "amarelo" },
            { id: 4, cl: "Óptica Lionda II", lk: 50, stL: "amarelo", ln: 0, stLn: "branco", mn: 20, stM: "amarelo" },
            { id: 5, cl: "Ana Liliam Cake", lk: 30, stL: "azul", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 6, cl: "Li&LiDecor", lk: 0, stL: "verde", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 7, cl: "Qualy Quimy", lk: 0, stL: "verde", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 8, cl: "EsquadriaBox", lk: 50, stL: "azul", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 9, cl: "Fretadão", lk: 0, stL: "verde", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 10, cl: "Despachante", lk: 0, stL: "branco", ln: 0, stLn: "verde", mn: 0, stM: "branco" },
            { id: 11, cl: "House Secury", lk: 0, stL: "verde", ln: 80, stLn: "azul", mn: 0, stM: "branco" },
            { id: 12, cl: "Lu Cabeleireiro", lk: 50, stL: "amarelo", ln: 0, stLn: "branco", mn: 0, stM: "branco" },
            { id: 13, cl: "Walisson", lk: 50, stL: "amarelo", ln: 100, stLn: "azul", mn: 0, stM: "branco" },
            { id: 14, cl: "Fabio Salao Musica", lk: 100, stL: "amarelo", ln: 0, stLn: "branco", mn: 20, stM: "amarelo" },
            { id: 15, cl: "Douglas", lk: 50, stL: "amarelo", ln: 0, stLn: "branco", mn: 30, stM: "amarelo" },
            { id: 16, cl: "Ocran", lk: 50, stL: "amarelo", ln: 0, stLn: "branco", mn: 0, stM: "branco" }
        ];

        let db = JSON.parse(localStorage.getItem('crm_impulso_final_v10')) || listaOficial;

        function salvar() { localStorage.setItem('crm_impulso_final_v10', JSON.stringify(db)); render(); }

        function render() {
            const grid = document.getElementById('gridDisplay');
            grid.innerHTML = '';
            let recebido = 0, aReceber = 0;

            db.forEach(i => {
                const calcular = (v, s) => {
                    let n = parseFloat(v) || 0;
                    if(s === 'azul') recebido += n;
                    else if(s === 'branco' || s === 'amarelo') aReceber += n;
                };
                calcular(i.lk, i.stL); calcular(i.ln, i.stLn); calcular(i.mn, i.stM);

                const card = document.createElement('div');
                card.className = 'card-cliente';
                card.innerHTML = `
                    <h3>${i.cl}</h3>
                    <div class="card-split">
                        ${i.lk > 0 || i.stL === 'verde' ? `<div class="split-row"><span>LINK</span><b style="color:${getCol(i.stL)}">${i.lk > 0 ? 'R$'+i.lk : ''} ${getS(i.stL)}</b></div>` : ''}
                        ${i.ln > 0 || i.stLn === 'verde' ? `<div class="split-row"><span>LAN</span><b style="color:${getCol(i.stLn)}">${i.ln > 0 ? 'R$'+i.ln : ''} ${getS(i.stLn)}</b></div>` : ''}
                        ${i.mn > 0 || i.stM === 'verde' ? `<div class="split-row"><span>MAN</span><b style="color:${getCol(i.stM)}">${i.mn > 0 ? 'R$'+i.mn : ''} ${getS(i.stM)}</b></div>` : ''}
                    </div>`;
                card.onclick = () => abrirModal(i);
                grid.appendChild(card);
            });

            document.getElementById('somaRecebido').innerText = `R$ ${recebido.toFixed(2)}`;
            document.getElementById('somaAReceber').innerText = `R$ ${aReceber.toFixed(2)}`;
            document.getElementById('somaTotal').innerText = `R$ ${(recebido + aReceber).toFixed(2)}`;
        }

        function getS(s) { return { azul: "PG", amarelo: "AR", verde: "CORTESIA", branco: "PEND" }[s]; }
        function getCol(s) { return { azul: "#007bff", amarelo: "#ffcc00", verde: "#38e391", branco: "#fff" }[s]; }

        function mudarStatus(id, campo) {
            const idx = db.findIndex(x => x.id === id);
            const ord = ["branco", "amarelo", "azul", "verde"];
            db[idx][campo] = ord[(ord.indexOf(db[idx][campo]) + 1) % 4];
            salvar(); abrirModal(db[idx]);
        }

        function atualizarVal(id, campo, val) {
            const idx = db.findIndex(x => x.id === id);
            db[idx][campo] = parseFloat(val) || 0;
            salvar();
        }

        function abrirModal(i) {
            const m = document.getElementById('modalInterno');
            m.innerHTML = `
                <h3 style="color:var(--green); text-align:center; margin-bottom:20px;">${i.cl}</h3>
                <div class="edit-row">
                    <input type="number" value="${i.lk}" onchange="atualizarVal(${i.id}, 'lk', this.value)">
                    <button class="btn-st st-${i.stL}" onclick="mudarStatus(${i.id}, 'stL')">${getS(i.stL)}</button>
                </div>
                <div class="edit-row">
                    <input type="number" value="${i.ln}" onchange="atualizarVal(${i.id}, 'ln', this.value)">
                    <button class="btn-st st-${i.stLn}" onclick="mudarStatus(${i.id}, 'stLn')">${getS(i.stLn)}</button>
                </div>
                <div class="edit-row">
                    <input type="number" value="${i.mn}" onchange="atualizarVal(${i.id}, 'mn', this.value)">
                    <button class="btn-st st-${i.stM}" onclick="mudarStatus(${i.id}, 'stM')">${getS(i.stM)}</button>
                </div>
                <button class="btn-st st-branco" style="width:100%; margin-top:10px; border-color:#444" onclick="document.getElementById('modalCtrl').style.display='none'">FECHAR</button>
                <button class="btn-st" style="background:transparent; color:red; border:none; width:100%; margin-top:10px; font-size:10px" onclick="if(confirm('Excluir cliente?')){db=db.filter(x=>x.id!==${i.id});salvar();document.getElementById('modalCtrl').style.display='none'}">EXCLUIR</button>
            `;
            document.getElementById('modalCtrl').style.display = 'flex';
        }

        function adicionarCliente() {
            const cl = document.getElementById('novoNome').value;
            if(!cl) return;
            db.push({
                id: Date.now(), cl, 
                lk: parseFloat(document.getElementById('novoLink').value) || 0, stL: "branco",
                ln: parseFloat(document.getElementById('novoLan').value) || 0, stLn: "branco",
                mn: parseFloat(document.getElementById('novoMan').value) || 0, stM: "branco"
            });
            salvar();
            ['novoNome','novoLink','novoLan','novoMan'].forEach(id => document.getElementById(id).value = '');
        }
        render();
    </script>
</body>
</html>
