<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ImpulsoWeb10 | Gestão de Clientes</title>
    <style>
        :root {
            --bg-dark: #050707;
            --card-bg: #0d1212;
            --neon-green: #38e391;
            --pay-blue: #007bff;
            --pay-free: #38e391;
            --pay-pending: #ffffff;
            --text-sec: #a0a8a8;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 20px; }
        
        header { text-align: center; padding: 40px 0; }
        h1 { color: var(--neon-green); margin: 0; }

        /* GRID DE CLIENTES */
        .grid-clientes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card-cliente {
            background: var(--card-bg);
            border: 1px solid #1a2222;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .card-cliente:hover { border-color: var(--neon-green); transform: translateY(-5px); }
        
        .status-dot {
            display: inline-block;
            width: 12px; height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--neon-green);
            padding: 30px;
            border-radius: 20px;
            width: 90%; max-width: 500px;
            position: relative;
        }

        /* BOTÕES DE STATUS DENTRO DO MODAL */
        .btn-status {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            text-decoration: none;
            border: none;
        }

        .azul { background: var(--pay-blue); color: #fff; }
        .verde { background: var(--pay-free); color: #000; }
        .branco { background: var(--pay-pending); color: #000; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #1a2222;
            padding: 10px 0;
            font-size: 14px;
        }

        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: var(--text-sec); }
    </style>
</head>
<body>

<header>
    <h1>Gestão ImpulsoWeb10</h1>
    <p>Clique no cliente para ver detalhes da planilha</p>
</header>

<div class="grid-clientes" id="listaClientes">
    </div>

<div id="modalDetalhes" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <div id="detalhesCorpo">
            </div>
    </div>
</div>

<script>
// Simulando os dados da sua foto da planilha
const clientes = [
    { data: "10/03/2026", atividade: "Pet", nome: "Amor por Patinhas", avaliacao: 50, mensal: 0, contato: "11-973051524", bairro: "Nova Louzada", status: "azul", total: 50 },
    { data: "17/03/2026", atividade: "Decoração", nome: "Li&LiDecor", avaliacao: 0, mensal: 0, contato: "-", bairro: "-", status: "verde", total: 0 },
    { data: "18/03/2026", atividade: "Cabelereiro", nome: "Lu Cabeleireiro", avaliacao: 50, mensal: 0, contato: "-", bairro: "-", status: "branco", total: 50 },
    { data: "18/03/2026", atividade: "Construção", nome: "Walisson", avaliacao: 50, mensal: 100, contato: "-", bairro: "-", status: "azul", total: 150 }
];

const grid = document.getElementById('listaClientes');
const modal = document.getElementById('modalDetalhes');
const corpo = document.getElementById('detalhesCorpo');

// Renderizar os Cards
clientes.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card-cliente';
    
    // Cor da bolinha de status
    let corStatus = c.status === 'azul' ? '#007bff' : (c.status === 'verde' ? '#38e391' : '#fff');

    card.innerHTML = `
        <div style="text-align:right"><span class="status-dot" style="background:${corStatus}"></span></div>
        <h3 style="margin-top:0">${c.nome}</h3>
        <p style="font-size:12px; color:var(--text-sec)">${c.atividade}</p>
        <div style="font-weight:bold; color:var(--neon-green)">Total: R$ ${c.total.toFixed(2)}</div>
    `;

    card.onclick = () => abrirModal(c);
    grid.appendChild(card);
});

function abrirModal(c) {
    let classeBotao = c.status; // azul, verde ou branco
    let textoStatus = c.status === 'azul' ? 'PAGAMENTO OK' : (c.status === 'verde' ? 'CORTESIA / GRÁTIS' : 'AGUARDANDO PAGAMENTO');

    corpo.innerHTML = `
        <h2 style="color:var(--neon-green); margin-bottom:5px;">${c.nome}</h2>
        <p style="color:var(--text-sec); margin-bottom:20px;">${c.atividade} | Desde ${c.data}</p>
        
        <div class="info-row"><span>Bairro:</span> <span>${c.bairro}</span></div>
        <div class="info-row"><span>Link Avaliação:</span> <span>R$ ${c.avaliacao.toFixed(2)}</span></div>
        <div class="info-row"><span>Manutenção:</span> <span>R$ ${c.mensal.toFixed(2)}</span></div>
        <div class="info-row" style="border:none; font-weight:bold; font-size:18px; margin-top:10px;">
            <span>TOTAL GERAL:</span> <span>R$ ${c.total.toFixed(2)}</span>
        </div>

        <div class="btn-status ${classeBotao}">${textoStatus}</div>
        
        <a href="https://wa.me/${c.contato.replace(/\D/g,'')}" class="btn-status" style="background:#25d366; color:#fff">CHAMAR NO WHATSAPP</a>
    `;
    modal.style.display = 'flex';
}

document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if(e.target == modal) modal.style.display = 'none'; }
</script>

</body>
</html>
