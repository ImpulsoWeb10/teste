<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - ImpulsoWeb10</title>
    <style>
        :root {
            --bg: #050707;
            --card: #0d1212;
            --neon-green: #38e391; /* Verde (Cortesia) */
            --royal-blue: #007bff; /* Azul (Pago) */
            --pure-white: #ffffff; /* Branco (Pendente) */
            --text-main: #f0f0f0;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        
        /* Cabeçalho com Resumo Financeiro */
        .resumo-topo {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 40px;
        }
        .box-valor {
            background: var(--card); padding: 20px; border-radius: 12px;
            border-bottom: 4px solid #333; text-align: center;
        }
        .box-valor.pago { border-color: var(--royal-blue); }
        .box-valor.cortesia { border-color: var(--neon-green); }

        /* Grid de Clientes */
        .container-clientes { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .card-cliente { 
            background: var(--card); border: 1px solid #1a2222; 
            padding: 25px; border-radius: 18px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .card-cliente:hover { border-color: var(--neon-green); transform: scale(1.02); }

        /* Estilo das Cores de Status */
        .btn-status { width: 100%; padding: 10px; border-radius: 6px; font-weight: 700; border: none; margin: 5px 0; }
        .status-azul { background: var(--royal-blue); color: white; }
        .status-verde { background: var(--neon-green); color: #000; }
        .status-branco { background: var(--pure-white); color: #000; border: 1px solid #ccc; }

        /* Modal Detalhado */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 99;
        }
        .modal-caixa { 
            background: var(--card); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; border: 1px solid #252d2d;
        }
        .linha-info { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a2222; }
    </style>
</head>
<body>

    <h1 style="text-align:center; margin-bottom: 40px;">Dashboard de Vendas 📊</h1>

    <div class="resumo-topo">
        <div class="box-valor pago">
            <small>TOTAL RECEBIDO (AZUL)</small>
            <h2 id="totalGeral">R$ 0,00</h2>
        </div>
        <div class="box-valor cortesia">
            <small>CORTESIAS (VERDE)</small>
            <h2 id="totalCortesia">0</h2>
        </div>
    </div>

    <div class="container-clientes" id="grade"></div>

    <div id="modalId" class="modal-overlay">
        <div class="modal-caixa" id="conteudoModal"></div>
    </div>

    <script>
        // Dados REAIS baseados na sua planilha (sem Lidia, sem Prova Real)
        const db = [
            { data: "10/03/2026", atividade: "Pet", cliente: "Amor por Patinhas", link: 50.00, stL: "azul", lan: 0, stLa: "", mens: 0, stM: "", contato: "11-973051524", bairro: "Nova Louzada", total: 50.00 },
            { data: "15/03/2026", atividade: "Material de Construção", cliente: "Itapuã Center", link: 59.90, stL: "azul", lan: 0, stLa: "", mens: 0, stM: "", contato: "-", bairro: "-", total: 59.90 },
            { data: "17/03/2026", atividade: "Decoração", cliente: "Li&LiDecor", link: 0, stL: "verde", lan: 0, stLa: "", mens: 0, stM: "", contato: "-", bairro: "-", total: 0.00 },
            { data: "18/03/2026", atividade: "Segurança", cliente: "House Secury", link: 0, stL: "verde", lan: 80.00, stLa: "azul", mens: 0, stM: "", contato: "-", bairro: "Itaqua", total: 80.00 },
            { data: "18/03/2026", atividade: "Construção", cliente: "Walisson", link: 50.00, stL: "azul", lan: 100.00, stLa: "azul", mens: 0, stM: "", contato: "-", bairro: "-", total: 150.00 },
            { data: "18/03/2026", atividade: "Cultura", cliente: "Fabio Salao Musica", link: 100.00, stL: "azul", lan: 0, stLa: "", mens: 20.00, stM: "branco", contato: "-", bairro: "-", total: 100.00 }
        ];

        const grade = document.getElementById('grade');
        let faturamento = 0;
        let cortesias = 0;

        db.forEach(item => {
            // Soma faturamento (tudo que for status azul)
            if(item.stL === "azul") faturamento += item.link;
            if(item.stLa === "azul") faturamento += item.lan;
            if(item.stM === "azul") faturamento += item.mens;
            if(item.stL === "verde") cortesias++;

            const card = document.createElement('div');
            card.className = 'card-cliente';
            card.innerHTML = `
                <small style="color: #666">${item.data}</small>
                <h3 style="margin: 10px 0 5px 0; color: var(--neon-green)">${item.cliente}</h3>
                <div style="font-size: 14px; color: #aaa; margin-bottom: 15px;">${item.atividade}</div>
                <div style="font-size: 20px; font-weight: bold;">R$ ${item.total.toFixed(2)}</div>
            `;
            card.onclick = () => abrir(item);
            grade.appendChild(card);
        });

        document.getElementById('totalGeral').innerText = `R$ ${faturamento.toFixed(2)}`;
        document.getElementById('totalCortesia').innerText = cortesias;

        function abrir(i) {
            const corpo = document.getElementById('conteudoModal');
            corpo.innerHTML = `
                <h2 style="margin:0">${i.cliente}</h2>
                <p style="color:#666; margin-bottom:20px">${i.atividade}</p>
                
                <div class="linha-info"><span>Bairro:</span> <span>${i.bairro}</span></div>
                <div class="linha-info"><span>Contato:</span> <span>${i.contato}</span></div>

                <div style="margin-top:20px">
                    ${i.link > 0 || i.stL === 'verde' ? `<div class="btn-status status-${i.stL}">Link: R$ ${i.link.toFixed(2)}</div>` : ''}
                    ${i.lan > 0 || i.stLa === 'verde' ? `<div class="btn-status status-${i.stLa}">Lanpage: R$ ${i.lan.toFixed(2)}</div>` : ''}
                    ${i.mens > 0 || i.stM === 'verde' ? `<div class="btn-status status-${i.stM}">Mensal: R$ ${i.mens.toFixed(2)}</div>` : ''}
                </div>

                <div class="linha-info" style="border:none; font-size:22px; font-weight:bold; margin-top:15px">
                    <span>TOTAL:</span> <span>R$ ${i.total.toFixed(2)}</span>
                </div>
                
                <button onclick="document.getElementById('modalId').style.display='none'" style="width:100%; padding:12px; margin-top:20px; cursor:pointer; background:#333; color:#fff; border:none; border-radius:8px">Fechar</button>
            `;
            document.getElementById('modalId').style.display = 'flex';
        }
    </script>
</body>
</html>
